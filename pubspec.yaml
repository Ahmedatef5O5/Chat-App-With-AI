name: chat_app_with_ai
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  animated_text_kit: ^4.3.0
  audioplayers: ^6.6.0
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.1.3
  cupertino_icons: ^1.0.8
  device_preview: ^1.2.0
  file_picker: ^10.3.10
  firebase_ai: ^3.8.0
  firebase_app_check: ^0.4.1+4
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: 2.2.2
  gap: ^3.0.1
  google_generative_ai: ^0.4.7
  image_picker: ^1.2.1
  intl: 0.19.0
  lottie: ^3.0.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  record: ^6.2.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:

